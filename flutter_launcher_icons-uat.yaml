# Launcher icon (shown OUTSIDE the app) for the `uat` flavor — UAT watermark.
# Generated from tool/gen_launcher_icons.py. In-app logos are NOT affected.
# Regenerate icons:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher/ic_launcher_uat.png"
  remove_alpha_ios: true
  adaptive_icon_background: "assets/launcher/adaptive_bg.png"
  adaptive_icon_foreground: "assets/launcher/adaptive_fg_uat.png"
