name: Unit Tests

# Run the unit/widget tests in `test/` on pushes to `main` and on any pull
# request targeting `main`. The pull_request trigger is required so the status
# check reports on PRs — branch protection can then block a merge when it fails.
# (Integration tests in `integration_test/` need a device/emulator and are not
#  part of this fast check.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run for the same branch when a new commit is pushed.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: flutter test (test/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run unit tests
        run: flutter test test/ --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

      # Notify Telegram on BOTH success and failure (skips cancelled runs, e.g.
      # superseded by a newer commit). Needs two repo secrets:
      # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID.
      - name: Notify Telegram
        if: ${{ always() && job.status != 'cancelled' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_ICON: ${{ job.status == 'success' && '✅' || '❌' }}
          STATUS_TEXT: ${{ job.status == 'success' && 'CI passed' || 'CI failed' }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is empty — check the repository secrets. Skipping notification."
            exit 0
          fi
          read -r -d '' TEXT <<EOF || true
          ${STATUS_ICON} <b>${STATUS_TEXT}</b> — ${{ github.repository }}
          Branch: <code>${{ github.ref_name }}</code>
          Commit: <code>${{ github.sha }}</code>
          By: ${{ github.actor }}
          Event: ${{ github.event_name }}

          <a href="${RUN_URL}">View the run</a>
          EOF
          response=$(curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=${TEXT}" \
            -w '\nHTTP_STATUS:%{http_code}')
          echo "$response"
          echo "$response" | grep -q '"ok":true' || {
            echo "::error::Telegram API rejected the message (see response above). 404 usually means a wrong/empty bot token; 400 'chat not found' means a wrong chat id.";
            exit 1;
          }
