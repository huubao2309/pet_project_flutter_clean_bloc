name: Build APK (reusable)

# Reusable workflow: builds ONE flavor and pushes its APK to that flavor's own
# Telegram channel. Called by build_staging.yml / build_uat.yml / build_prod.yml.
#
# Per-channel split: the job binds to the GitHub Environment named after the
# flavor, so `TELEGRAM_CHAT_ID` (an *environment* secret) is that channel's id.
# `TELEGRAM_BOT_TOKEN` is a shared *repository* secret. Callers pass both with
# `secrets: inherit`.
on:
  workflow_call:
    inputs:
      flavor:
        description: 'Flavor to build: staging | uat | prod'
        required: true
        type: string

jobs:
  build:
    name: build ${{ inputs.flavor }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.flavor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (${{ inputs.flavor }})
        run: >-
          flutter build apk --debug
          --flavor ${{ inputs.flavor }}
          -t lib/main_${{ inputs.flavor }}.dart

      # Keep the APK on the run too, so it's always downloadable from GitHub
      # (also the fallback when the APK is over Telegram's 50 MB upload limit).
      - name: Upload APK to workflow artifacts
        if: ${{ job.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.flavor }}
          path: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-debug.apk
          if-no-files-found: warn

      # Push the built APK to the flavor's own Telegram channel on success;
      # on failure send a text status instead.
      - name: Notify Telegram (${{ inputs.flavor }})
        if: ${{ always() && job.status != 'cancelled' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APK_PATH: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-debug.apk
          STATUS_ICON: ${{ job.status == 'success' && '✅' || '❌' }}
          STATUS_TEXT: ${{ job.status == 'success' && 'Build succeeded' || 'Build failed' }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is empty — check the repository secret and the '${{ inputs.flavor }}' environment secret. Skipping notification."
            exit 0
          fi
          TG_API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          read -r -d '' CAPTION <<EOF || true
          ${STATUS_ICON} <b>${STATUS_TEXT}</b> — <b>${{ inputs.flavor }}</b>
          Ref: <code>${{ github.ref_name }}</code>
          Commit: <code>${{ github.sha }}</code>
          By: ${{ github.actor }}
          <a href="${RUN_URL}">View the run</a>
          EOF

          send_text() {
            curl -sS -X POST "${TG_API}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true" \
              --data-urlencode "text=${1}" \
              -w '\nHTTP_STATUS:%{http_code}'
          }
          check_ok() {
            echo "$1"
            echo "$1" | grep -q '"ok":true' || {
              echo "::error::Telegram API call failed (see response above). 404=bad/empty token, 400=bad chat id or file too large.";
              exit 1;
            }
          }

          # Build failed (or no APK produced) → send the status text only.
          if [ "${{ job.status }}" != "success" ] || [ ! -f "$APK_PATH" ]; then
            check_ok "$(send_text "$CAPTION")"
            exit 0
          fi

          # Success → upload the APK itself. Telegram bots cap uploads at 50 MB.
          size=$(wc -c < "$APK_PATH")
          if [ "$size" -gt $((50 * 1024 * 1024)) ]; then
            mb=$((size / 1024 / 1024))
            echo "::warning::APK is ${mb} MB, over Telegram's 50 MB bot limit. Sending a note + artifact link instead."
            NOTE="${CAPTION}"$'\n'"⚠️ APK is ${mb} MB (> 50 MB Telegram limit) — download it from the run's Artifacts."
            check_ok "$(send_text "$NOTE")"
            exit 0
          fi

          response=$(curl -sS -X POST "${TG_API}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F parse_mode="HTML" \
            -F document=@"${APK_PATH}" \
            -F caption="${CAPTION}" \
            -w '\nHTTP_STATUS:%{http_code}')
          check_ok "$response"
