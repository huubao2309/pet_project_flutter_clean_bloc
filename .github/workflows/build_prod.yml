name: Build Prod

# Builds the PROD flavor when an RC tag is pushed: vX.Y.Z_RCn
# (e.g. v1.12.101_RC1, v12.23.111_RC2). These tags are typically created from a
# version branch (vX.Y.Z). The filter anchors the whole tag name.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+_RC[0-9]+'

jobs:
  prod:
    uses: ./.github/workflows/_build_flavor.yml
    with:
      flavor: prod
    secrets: inherit
